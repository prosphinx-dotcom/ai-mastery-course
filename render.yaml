services:
  - type: web
    name: ai-mastery-course
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        value: https://ckooqnaxvrcswjpncyxl.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
        # !! Set this ONCE manually in Render Dashboard → Environment
        # !! DO NOT use generateValue:true — that rotates it on every deploy and logs everyone out
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PAYMENT_LINK
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
